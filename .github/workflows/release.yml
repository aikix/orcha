name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
      - run: rm -f bun.lock && bun install
        timeout-minutes: 3
      - run: bun test packages/config-loader/
      - run: bun test packages/discovery/src/
      - run: bun test apps/cli/src/format.test.ts

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
      - run: rm -f bun.lock && bun install
        timeout-minutes: 3
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          npx
          --package semantic-release@25
          --package @semantic-release/commit-analyzer
          --package @semantic-release/release-notes-generator
          --package @semantic-release/changelog
          --package @semantic-release/exec
          --package @semantic-release/npm
          --package @semantic-release/github
          --package @semantic-release/git
          semantic-release
