name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
      - run: rm -f bun.lock && bun install
        timeout-minutes: 3
      - run: bun test packages/config-loader/
      - run: bun test packages/discovery/src/
      - run: bun test apps/cli/src/format.test.ts

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
      - run: rm -f bun.lock && bun install
        timeout-minutes: 3
      - name: Configure git for release bot
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "aikix-release-bot[bot]"
          git config user.email "3289376+aikix-release-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/aikix/orcha.git"
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: aikix-release-bot[bot]
          GIT_AUTHOR_EMAIL: 3289376+aikix-release-bot[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: aikix-release-bot[bot]
          GIT_COMMITTER_EMAIL: 3289376+aikix-release-bot[bot]@users.noreply.github.com
        run: >
          npx
          --package semantic-release@25
          --package @semantic-release/commit-analyzer
          --package @semantic-release/release-notes-generator
          --package @semantic-release/changelog
          --package @semantic-release/exec
          --package @semantic-release/npm
          --package @semantic-release/github
          --package @semantic-release/git
          semantic-release
