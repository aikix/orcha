name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
      - run: rm -f bun.lock && bun install
        timeout-minutes: 3
      - run: bun run typecheck

  build:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
      - run: rm -f bun.lock && bun install
        timeout-minutes: 3

      # Unit tests with coverage
      - name: Test config-loader
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/config-loader packages/config-loader/src/

      - name: Test discovery
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/discovery packages/discovery/src/

      - name: Test orchestrator
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/orchestrator packages/orchestrator/src/

      - name: Test CLI utils + format
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/cli apps/cli/src/utils.test.ts apps/cli/src/format.test.ts

      # Integration tests (no coverage — subprocess tests)
      - name: Test CLI commands (integration)
        run: bun test apps/cli/src/commands.test.ts

      # Merge lcov files
      - name: Merge coverage reports
        run: |
          mkdir -p coverage/merged
          cat coverage/config-loader/lcov.info \
              coverage/discovery/lcov.info \
              coverage/orchestrator/lcov.info \
              coverage/cli/lcov.info \
            > coverage/merged/lcov.info 2>/dev/null || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/merged/lcov.info
          fail_ci_if_error: false
