name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
          no-cache: true
      - run: bun install --verbose
        timeout-minutes: 5
      - run: bun test packages/config-loader/
      - run: bun test packages/discovery/src/
      - run: bun test apps/cli/src/format.test.ts
