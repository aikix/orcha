name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
      - run: rm -f bun.lock && bun install
        timeout-minutes: 3
      - run: bun test packages/config-loader/
      - run: bun test packages/discovery/src/
      - run: bun test apps/cli/src/format.test.ts
